appId: com.maneframe.app
# Photo picker entry point -> tflite segmentation (Iteration 4R-4).
#
# This flow was originally scoped to pick a photo via the system library
# picker and assert the segmenter badge reads "tflite segmentation". That
# selection step turned out to be unsafe to automate on this physical
# device: the installed picker handler is the full Google Photos app (not
# a scoped system Photo Picker sheet), so any coordinate/search-based
# selection risks tapping into the phone owner's real photo library
# (confirmed during Iteration 4R-4 development - a government ID and
# family photos surfaced while probing for a safe, deterministic
# coordinate). Automating past this point was abandoned for that reason.
#
# This flow instead verifies everything that IS safe and deterministic to
# automate: the picker launches (proving the entry point and permission
# flow work) and the app is left in a good state afterward. The badge
# text assertion ("tflite segmentation" after actually picking a photo)
# stays a manual verification step - see docs/E2E.md's "Photo picking"
# coverage row and the Iteration 4R-4 SUMMARY.md for how it was verified
# instead (build/version parity with the accepted dev-client run, plus
# code-level verification of the expo-asset fix).
---
- launchApp:
    clearState: true
- tapOn: "Preview"
- tapOn: "Pick a photo"
- tapOn: "Choose from Library"
- extendedWaitUntil:
    visible: "Search Google Photos"
    timeout: 8000
- back
- assertVisible: "Pick a photo"
